<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ═══════════════════════════════════════════════════
         FAVICON — Works on localhost AND deployed links
         All three formats ensure maximum browser coverage:
         • .ico  → IE, old Edge, bookmarks bar
         • .png  → Chrome, Firefox, modern browsers
         • .svg  → Chrome 80+, Firefox, Safari (vector, scales perfectly)
    ═══════════════════════════════════════════════════ -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32"  href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16"  href="%PUBLIC_URL%/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml"             href="%PUBLIC_URL%/favicon.svg" />

    <!-- Apple devices (iPhone, iPad home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/logo192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ═══════════════════════════════════════════════════
         META TAGS
    ═══════════════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Browser / OS accent colour (Android Chrome, Safari pinned tabs) -->
    <meta name="theme-color" content="#1a6b3a" />
    <meta name="msapplication-TileColor" content="#1a6b3a" />

    <!-- SEO -->
    <meta name="description"
      content="AgriChain — Blockchain-powered agricultural supply chain. Transparent, secure farm-to-table tracking on Ethereum." />
    <meta name="keywords"
      content="AgriChain, blockchain, agriculture, supply chain, ethereum, farm, traceability, DApp" />
    <meta name="author" content="AgriChain Team" />

    <!-- Open Graph (WhatsApp, Telegram, Facebook previews) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="AgriChain — Blockchain Agricultural Supply Chain" />
    <meta property="og:description" content="Transparent farm-to-table produce tracking secured on Ethereum blockchain." />
    <meta property="og:image"       content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:url"         content="https://agrichain.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="AgriChain — Blockchain Agricultural Supply Chain" />
    <meta name="twitter:description" content="Transparent farm-to-table produce tracking secured on Ethereum blockchain." />
    <meta name="twitter:image"       content="%PUBLIC_URL%/logo512.png" />

    <title>AgriChain — Blockchain Agricultural Supply Chain</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
